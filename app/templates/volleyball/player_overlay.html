<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Volleyball Player Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@700&family=Teko:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
   <style>
        body { margin: 0; overflow: hidden; font-family: 'Roboto Condensed', sans-serif; color: white; height: 100vh; }
        
        .player-card {
            position: absolute;
            bottom: 50px;
            left: 50px;
            display: flex; align-items: stretch; background: rgba(15,15,20,0.95);
            border-radius: 8px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            transform: translateY(150%); opacity: 0; transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }
        .player-card.show { transform: translateY(0); opacity: 1; }

        .team-color-bar { width: 10px; }
        
        .number-box {
            font-family: 'Teko', sans-serif; font-size: 60px; line-height: 1;
            padding: 10px 25px; background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        
        .details-box {
            padding: 15px 30px; display: flex; flex-direction: column; justify-content: center; min-width: 300px;
        }
        .p-name { font-size: 32px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        .p-role { font-size: 18px; color: #aaa; text-transform: uppercase; letter-spacing: 2px; }

        .team-logo { width: 50px; height: 50px; object-fit: contain; margin: 0 20px; align-self: center; }
    </style>
</head>
<body>

    <div class="player-card" id="player-card">
        <div class="team-color-bar" id="p-color"></div>
        <div class="number-box" id="p-number" style="color: #fff;">00</div>
        <div class="details-box">
            <div class="p-name" id="p-name">PLAYER NAME</div>
            <div class="p-role" id="p-role">ROLE</div>
        </div>
        <img class="team-logo" id="p-logo" src="">
    </div>

    <script>
        const socket = io("/volleyball");
        socket.on('state_updated', (state) => {
            const card = document.getElementById('player-card');
            if (state.player_overlay_visible && state.current_player) {
                document.getElementById('p-color').style.backgroundColor = state.current_player.team_color;
                document.getElementById('p-number').style.color = state.current_player.team_color;
                document.getElementById('p-number').innerText = state.current_player.number;
                document.getElementById('p-name').innerText = state.current_player.name;
                document.getElementById('p-role').innerText = state.current_player.role;
                document.getElementById('p-logo').src = state.current_player.team_logo;
                card.classList.add('show');
            } else {
                card.classList.remove('show');
            }
        });
    </script>
</body>
</html>
