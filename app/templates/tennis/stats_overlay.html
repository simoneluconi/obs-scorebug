<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tennis Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Teko:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Roboto Condensed', sans-serif; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .stats-box {
            background: linear-gradient(180deg, rgba(25,25,30,0.98) 0%, rgba(10,10,12,0.98) 100%);
            width: 850px; border-radius: 12px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9); overflow: hidden;
            transform: translateY(150%); transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stats-box.show { transform: translateY(0); }
        
        .stats-header { 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 30px;
            background: #0a0a0c; padding: 25px 40px; border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .team-block { display: flex; align-items: center; gap: 15px; }
        .team-block.home { justify-content: flex-end; }
        .team-block.away { justify-content: flex-start; }
        
        .team-logo { width: 50px; height: 35px; object-fit: cover; border: 1px solid #333;}
        .team-abbr { font-family: 'Teko', sans-serif; font-size: 55px; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .match-title { text-align: center; color: #888; font-size: 16px; text-transform: uppercase; letter-spacing: 4px; font-weight: bold; }
        .stats-body { padding: 20px 0 40px 0; }
        
        .stat-row { 
            display: grid; grid-template-columns: 100px 1fr 100px; align-items: center; 
            padding: 12px 50px; transition: background 0.3s; border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .stat-row:hover { background: rgba(255,255,255,0.02); }
        
        .stat-val { font-family: 'Teko', sans-serif; font-size: 42px; text-align: center; font-weight: 600; }
        .stat-label { text-align: center; font-size: 20px; color: #ccc; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        
        .bar-wrapper { display: flex; align-items: center; justify-content: center; width: 100%; padding: 0 20px; box-sizing: border-box; margin-top: 5px;}
        .bar-container { 
            display: flex; width: 100%; height: 6px; background: #222; 
            border-radius: 10px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }
        .bar-home, .bar-away { height: 100%; transition: width 0.8s cubic-bezier(0.2, 1, 0.2, 1); }
    </style>
</head>
<body>
    <div class="stats-box" id="stats-box">
        <div class="stats-header">
            <div class="team-block home">
                <div class="team-abbr" id="h-abbr">G1</div>
                <img class="team-logo" id="h-logo" src="">
            </div>
            <div class="match-title">MATCH STATS</div>
            <div class="team-block away">
                <img class="team-logo" id="a-logo" src="">
                <div class="team-abbr" id="a-abbr">G2</div>
            </div>
        </div>

        <div class="stats-body">
            <div class="stat-row">
                <div class="stat-val" id="h-aces">0</div>
                <div class="stat-label">ACES</div>
                <div class="stat-val" id="a-aces">0</div>
            </div>
            
            <div class="stat-row">
                <div class="stat-val" id="h-df">0</div>
                <div class="stat-label">DOUBLE FAULTS</div>
                <div class="stat-val" id="a-df">0</div>
            </div>

            <div class="stat-row">
                <div class="stat-val" id="h-win">0</div>
                <div class="stat-label">
                    <div>WINNERS</div>
                    <div class="bar-wrapper"><div class="bar-container">
                        <div class="bar-home" id="bar-home" style="width:50%"></div>
                        <div class="bar-away" id="bar-away" style="width:50%"></div>
                    </div></div>
                </div>
                <div class="stat-val" id="a-win">0</div>
            </div>

            <div class="stat-row" style="border-bottom: none;">
                <div class="stat-val" id="h-unf">0</div>
                <div class="stat-label">UNFORCED ERRORS</div>
                <div class="stat-val" id="a-unf">0</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        socket.on('state_updated', (state) => {
            const box = document.getElementById('stats-box');
            if (state.visibility.stats) {
                document.getElementById('h-abbr').innerText = state.home_team.abbr;
                document.getElementById('a-abbr').innerText = state.away_team.abbr;
                document.getElementById('h-abbr').style.color = state.home_team.color;
                document.getElementById('a-abbr').style.color = state.away_team.color;
                document.getElementById('h-logo').src = state.home_team.logo;
                document.getElementById('a-logo').src = state.away_team.logo;

                const hW = parseInt(state.home_team.stats.winners) || 0;
                const aW = parseInt(state.away_team.stats.winners) || 0;
                let hW_perc = 50; let aW_perc = 50;
                if (hW + aW > 0) { hW_perc = (hW / (hW + aW)) * 100; aW_perc = (aW / (hW + aW)) * 100; }

                document.getElementById('h-aces').innerText = state.home_team.stats.aces;
                document.getElementById('a-aces').innerText = state.away_team.stats.aces;
                document.getElementById('h-df').innerText = state.home_team.stats.double_faults;
                document.getElementById('a-df').innerText = state.away_team.stats.double_faults;
                document.getElementById('h-win').innerText = hW;
                document.getElementById('a-win').innerText = aW;
                document.getElementById('h-unf').innerText = state.home_team.stats.unforced;
                document.getElementById('a-unf').innerText = state.away_team.stats.unforced;

                document.getElementById('bar-home').style.width = hW_perc + '%';
                document.getElementById('bar-home').style.background = state.home_team.color;
                document.getElementById('bar-away').style.width = aW_perc + '%';
                document.getElementById('bar-away').style.background = state.away_team.color;

                box.classList.add('show');
            } else {
                box.classList.remove('show');
            }
        });
    </script>
</body>
</html>
