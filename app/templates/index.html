<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Sport - Sports Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 900px;
            padding: 2rem;
        }
        h1 {
            font-weight: 700;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #e5e7eb;
        }
        p {
            font-weight: 300;
            font-size: 1.25rem;
            color: #9ca3af;
            margin-bottom: 3rem;
        }
        .sports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
        }
        .sport-card {
            background-color: #1f2937;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            text-decoration: none;
            color: #f3f4f6;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #374151;
        }
        .sport-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }
        .sport-card .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #4f46e5;
        }
        .sport-card h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sports Overlay</h1>
        <p>Select a sport to launch the controller and graphic overlay.</p>
        <div class="sports-grid">
            {% for sport in sports %}
            <a href="{{ url_for(sport.url + '.controller') }}" class="sport-card">
                <span class="material-icons icon">{{ sport.icon }}</span>
                <h2>{{ sport.name }}</h2>
            </a>
            {% endfor %}
        </div>
    </div>
</body>
</html>
